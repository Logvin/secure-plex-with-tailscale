# Secure your Plex Software Stack with Tailscale
#
# Two networks:
#   - plex-public:   Plex lives here (publicly reachable via plex.tv)
#   - plex-private:  the *arr stack lives here, only reachable via tailnet
#
# The ts-subnet-router container bridges plex-private to your tailnet.
# Nothing on plex-private publishes ports to the host.

networks:
  plex-public:
    driver: bridge
  plex-private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
