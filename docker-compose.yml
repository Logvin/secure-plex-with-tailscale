# Secure your Plex Software Stack with Tailscale
#
# The plex-private Docker network has NO host port bindings.
# Anything on this network is only reachable via the tailnet,
# routed by the ts-subnet-router container which also runs
# Tailscale Serve to expose each app at a clean HTTPS URL.
#
# Bring up in a dedicated Compose project so it doesn't collide
# with any existing media stack on this host:
#
#   docker compose -p plex-takehome up -d
#
# Tear down with:
#
#   docker compose -p plex-takehome down -v

networks:
  plex-private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # ===== Tailscale subnet router + Serve =====
  # Bridges the plex-private network to the tailnet, AND runs
  # Tailscale Serve to publish each *arr app at a friendly HTTPS URL.
  # Satisfies the "subnet router" half of the take-home spec.

  app:
    image: tailscale/tailscale:latest
    hostname: app                          # becomes app.<your-tailnet>.ts.net
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_ROUTES=${TS_ROUTES}
      - TS_USERSPACE=false                 # kernel networking required for subnet routing
      - TS_STATE_DIR=/var/lib/tailscale    # persist state across restarts
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=--advertise-tags=tag:plex-router
    volumes:
      - ./tailscale-state/app:/var/lib/tailscale
      - ./serve.json:/config/serve.json:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      plex-private:
        ipv4_address: 172.30.0.2
    restart: unless-stopped

  # ===== Tailscale SSH device =====
  # Separate Tailscale node with --ssh enabled. Satisfies the
  # "Tailscale device with SSH enabled" half of the take-home spec.
  # Lives on plex-private so it can be used as a debug/jump host
  # inside the private network.

  ts-ssh:
    image: tailscale/tailscale:latest
    hostname: ssh-sidecar
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_USERSPACE=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--ssh --advertise-tags=tag:plex-router
    volumes:
      - ./tailscale-state/ssh-sidecar:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - plex-private
    restart: unless-stopped

  # ===== The *arr stack =====
  # Each container has NO `ports:` block — only reachable via the
  # tailnet, through the subnet router above. Static IPs match the
  # serve.json handler config.

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-demo
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
    networks:
      plex-private:
        ipv4_address: 172.30.0.10
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr-demo
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
    networks:
      plex-private:
        ipv4_address: 172.30.0.11
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr-demo
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    networks:
      plex-private:
        ipv4_address: 172.30.0.12
    restart: unless-stopped

  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli-demo
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/tautulli:/config
    networks:
      plex-private:
        ipv4_address: 172.30.0.13
    restart: unless-stopped
